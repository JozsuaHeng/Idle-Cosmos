<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Token Universe</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<canvas id="space"></canvas>

<aside id="sidebar">
  <header>
    <h1>🌌 The Known Universe</h1>
    <p class="tagline">One universe, built from every token. Drag to pan, scroll to zoom.</p>
  </header>
  <h2>Locations</h2>
  <ul id="locationList"></ul>
</aside>
<button id="sidebarToggle" title="Toggle locations">☰</button>

<div id="hud">
  <div id="universeName">The Known Universe</div>
  <div id="blocksVal"></div>
  <div class="stat">this session&ensp;<span id="sessTok">0</span> tokens · <span id="sessEnergy">0</span> energy</div>
  <div class="stat total">all time&ensp;<span id="totTok">0</span> tokens · <span id="totEnergy">0</span> energy</div>
</div>

<div id="milestoneBar">
  <div id="milestoneLabel"></div>
  <div class="track"><div id="milestoneFill"></div></div>
</div>

<div id="zoomCtl">
  <button id="zoomIn" title="Zoom in">+</button>
  <div id="zoomPct">100%</div>
  <button id="zoomOut" title="Zoom out">−</button>
  <button id="zoomReset" title="Reset view">⌂</button>
</div>

<div id="toast"></div>
<button id="snapBtn" title="Save a picture of this universe">📸</button>

<script src="/app.js"></script>
</body>
</html>
